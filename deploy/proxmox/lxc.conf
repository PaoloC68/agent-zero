# Proxmox LXC config snippet for Agent Zero
# Place at: /etc/pve/lxc/500.conf  (after pct create)
# Container ID: 500
#
# Create command (run on Proxmox host):
#   pct create 500 local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst \
#     --arch amd64 \
#     --cores 8 \
#     --memory 16384 \
#     --swap 4096 \
#     --hostname agent-zero \
#     --net0 name=eth0,bridge=vmbr0,firewall=1,gw=192.168.1.1,ip=192.168.1.10/24,type=veth \
#     --rootfs local-lvm:100 \
#     --unprivileged 1 \
#     --features nesting=1,keyctl=1 \
#     --ostype ubuntu \
#     --start 0
#
# Then APPEND the lxc.* lines below to /etc/pve/lxc/500.conf before starting.

arch: amd64
cores: 8
features: nesting=1,keyctl=1
hostname: agent-zero
memory: 16384
net0: name=eth0,bridge=vmbr0,firewall=1,gw=192.168.1.1,ip=192.168.1.10/24,type=veth
ostype: ubuntu
rootfs: local-lvm:100
swap: 4096
unprivileged: 1

# Required for Docker inside unprivileged LXC
lxc.apparmor.profile: unconfined
lxc.cap.drop:
lxc.mount.auto: proc:rw sys:rw
